<!DOCTYPE html>
<html lang="{{ page.lang | default: site.lang | default: 'ja' }}">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{ page.title | default: site.title }}</title>
  <meta name="description" content="{{ page.description | default: site.description }}">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg-primary: #0a0a0f;
      --bg-secondary: #12121a;
      --bg-card: rgba(255, 255, 255, 0.03);
      --bg-card-hover: rgba(255, 255, 255, 0.06);
      --text-primary: #f0f0f5;
      --text-secondary: #a0a0b8;
      --text-muted: #606078;
      --accent-primary: #818cf8;
      --accent-secondary: #22d3ee;
      --accent-gradient: linear-gradient(135deg, #818cf8 0%, #22d3ee 100%);
      --border-color: rgba(255, 255, 255, 0.08);
      --border-hover: rgba(129, 140, 248, 0.4);
      --glow: 0 0 60px rgba(129, 140, 248, 0.15);
      --radius: 16px;
      --radius-sm: 10px;
      --font-sans: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      --font-mono: 'JetBrains Mono', monospace;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }

    body {
      font-family: var(--font-sans);
      background: var(--bg-primary);
      color: var(--text-primary);
      line-height: 1.7;
      min-height: 100vh;
      background-image:
        radial-gradient(ellipse 80% 50% at 50% -20%, rgba(129, 140, 248, 0.15), transparent),
        radial-gradient(ellipse 60% 40% at 100% 50%, rgba(34, 211, 238, 0.08), transparent);
    }

    a {
      color: var(--accent-primary);
      text-decoration: none;
      transition: color 0.2s;
    }
    a:hover { color: var(--accent-secondary); }

    /* Header */
    .site-header {
      background: rgba(10, 10, 15, 0.8);
      backdrop-filter: blur(20px);
      border-bottom: 1px solid var(--border-color);
      padding: 1rem 2rem;
      position: sticky;
      top: 0;
      z-index: 100;
    }

    .site-header__inner {
      max-width: 1200px;
      margin: 0 auto;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .site-header__title {
      font-size: 1.1rem;
      font-weight: 600;
      color: var(--text-primary);
    }

    .site-header__title span {
      background: var(--accent-gradient);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .site-header__nav {
      display: flex;
      gap: 2rem;
    }

    .site-header__nav a {
      color: var(--text-secondary);
      font-size: 0.875rem;
      font-weight: 500;
      transition: color 0.2s;
    }
    .site-header__nav a:hover { color: var(--accent-primary); }

    /* Main */
    main {
      max-width: 1200px;
      margin: 0 auto;
      padding: 4rem 2rem;
    }

    /* Hero */
    .hero {
      text-align: center;
      padding: 5rem 0;
    }

    .hero__title {
      font-size: 3.5rem;
      font-weight: 700;
      letter-spacing: -0.02em;
      margin-bottom: 1.5rem;
      background: var(--accent-gradient);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .hero__subtitle {
      font-size: 1.25rem;
      color: var(--text-secondary);
      width: min(100%, 44rem);
      margin: 0 auto 3rem;
      line-height: 1.8;
      text-align: center;
    }

    .hero__subtitle-line {
      display: block;
      width: fit-content;
      max-width: 100%;
      margin: 0 auto;
      text-wrap: balance;
    }

    /* Badges */
    .badges {
      display: flex;
      gap: 0.75rem;
      justify-content: center;
      flex-wrap: wrap;
      margin-bottom: 4rem;
    }

    .badge {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      padding: 0.6rem 1.2rem;
      background: var(--bg-card);
      border: 1px solid var(--border-color);
      border-radius: 999px;
      font-size: 0.875rem;
      font-weight: 500;
      color: var(--text-secondary);
      transition: all 0.25s ease;
    }

    .badge:hover {
      border-color: var(--border-hover);
      background: var(--bg-card-hover);
      color: var(--text-primary);
      transform: translateY(-2px);
    }

    /* Section */
    .section {
      margin: 5rem 0;
    }

    .section__title {
      font-size: 1.5rem;
      font-weight: 600;
      margin-bottom: 2rem;
      display: flex;
      align-items: center;
      gap: 0.75rem;
    }

    .section__title::before {
      content: '';
      width: 3px;
      height: 1.5rem;
      background: var(--accent-gradient);
      border-radius: 2px;
    }

    /* Card Grid */
    .card-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
      gap: 1.25rem;
    }

    /* Cards */
    .card {
      background: var(--bg-card);
      border: 1px solid var(--border-color);
      border-radius: var(--radius);
      padding: 1.75rem;
      transition: all 0.3s ease;
      position: relative;
      overflow: hidden;
    }

    .card::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 1px;
      background: var(--accent-gradient);
      opacity: 0;
      transition: opacity 0.3s ease;
    }

    .card:hover {
      background: var(--bg-card-hover);
      border-color: var(--border-hover);
      transform: translateY(-4px);
      box-shadow: var(--glow);
    }

    .card:hover::before {
      opacity: 1;
    }

    .card__header {
      display: flex;
      align-items: flex-start;
      gap: 1rem;
      margin-bottom: 1rem;
    }

    .card__number {
      width: 36px;
      height: 36px;
      display: flex;
      align-items: center;
      justify-content: center;
      background: var(--accent-gradient);
      color: white;
      font-weight: 600;
      font-size: 0.875rem;
      border-radius: var(--radius-sm);
      flex-shrink: 0;
    }

    .card__title {
      font-size: 1.1rem;
      font-weight: 600;
      color: var(--text-primary);
    }
    .card__title a { color: inherit; }
    .card__title a:hover { color: var(--accent-primary); }

    .card__desc {
      color: var(--text-secondary);
      font-size: 0.95rem;
      margin-bottom: 1rem;
      line-height: 1.6;
    }

    .card__tags {
      display: flex;
      flex-wrap: wrap;
      gap: 0.5rem;
    }

    .tag {
      padding: 0.3rem 0.7rem;
      background: rgba(129, 140, 248, 0.1);
      border-radius: 6px;
      font-size: 0.75rem;
      font-family: var(--font-mono);
      color: var(--accent-primary);
    }

    .card__link {
      display: inline-flex;
      align-items: center;
      gap: 0.4rem;
      margin-top: 1rem;
      font-size: 0.875rem;
      font-weight: 500;
      color: var(--accent-primary);
    }
    .card__link:hover {
      color: var(--accent-secondary);
    }

    /* Demo Card (legacy) */
    .demo-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
      gap: 1.25rem;
    }

    .demo-card {
      background: var(--bg-card);
      border: 1px solid var(--border-color);
      border-radius: var(--radius);
      padding: 1.75rem;
      transition: all 0.3s ease;
      position: relative;
      overflow: hidden;
    }

    .demo-card::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 1px;
      background: var(--accent-gradient);
      opacity: 0;
      transition: opacity 0.3s ease;
    }

    .demo-card:hover {
      background: var(--bg-card-hover);
      border-color: var(--border-hover);
      transform: translateY(-4px);
      box-shadow: var(--glow);
    }

    .demo-card:hover::before { opacity: 1; }

    .demo-card header {
      display: flex;
      align-items: flex-start;
      gap: 1rem;
      margin-bottom: 1rem;
    }

    .demo-card__id {
      width: 36px;
      height: 36px;
      display: flex;
      align-items: center;
      justify-content: center;
      background: var(--accent-gradient);
      color: white;
      font-weight: 600;
      font-size: 0.875rem;
      border-radius: var(--radius-sm);
    }

    .demo-card h2 { font-size: 1.1rem; font-weight: 600; margin: 0; }
    .demo-card h2 a { color: var(--text-primary); }
    .demo-card h2 a:hover { color: var(--accent-primary); }
    .demo-card p { color: var(--text-secondary); font-size: 0.95rem; margin: 0.5rem 0; line-height: 1.6; }
    .demo-card ul { margin: 0.75rem 0; padding-left: 1.25rem; }
    .demo-card li { color: var(--text-secondary); font-size: 0.875rem; margin: 0.4rem 0; }
    .demo-card__link {
      display: inline-flex;
      align-items: center;
      gap: 0.4rem;
      margin-top: 1rem;
      font-size: 0.875rem;
      font-weight: 500;
    }

    /* Metrics Card */
    .metrics-card {
      background: var(--bg-card);
      border: 1px solid var(--border-color);
      border-radius: var(--radius);
      padding: 2rem;
      margin: 2rem 0;
    }

    .metrics-card img {
      width: 100%;
      border-radius: var(--radius-sm);
    }

    /* Content */
    .content h1 { font-size: 2rem; font-weight: 700; margin: 2rem 0 1rem; }
    .content h2 { font-size: 1.5rem; font-weight: 600; margin: 2rem 0 1rem; }
    .content h3 { font-size: 1.25rem; font-weight: 600; margin: 1.5rem 0 0.75rem; }
    .content p { margin: 1rem 0; color: var(--text-secondary); line-height: 1.8; }
    .content ul, .content ol { margin: 1rem 0; padding-left: 1.5rem; }
    .content li { margin: 0.5rem 0; color: var(--text-secondary); }
    .content code {
      background: rgba(129, 140, 248, 0.1);
      padding: 0.2rem 0.5rem;
      border-radius: 6px;
      font-family: var(--font-mono);
      font-size: 0.875em;
      color: var(--accent-primary);
    }
    .content pre {
      background: var(--bg-secondary);
      border: 1px solid var(--border-color);
      border-radius: var(--radius-sm);
      padding: 1.25rem;
      overflow-x: auto;
      margin: 1.5rem 0;
    }
    .content pre code {
      background: none;
      padding: 0;
      color: var(--text-secondary);
    }
    .content blockquote {
      border-left: 3px solid var(--accent-primary);
      padding-left: 1.25rem;
      margin: 1.5rem 0;
      color: var(--text-muted);
      font-style: italic;
    }

    /* Footer */
    .site-footer {
      border-top: 1px solid var(--border-color);
      padding: 2rem;
      text-align: center;
      color: var(--text-muted);
      font-size: 0.875rem;
    }

    /* Responsive */
    @media (max-width: 768px) {
      .site-header { padding: 1rem; }
      .site-header__nav { display: none; }
      main { padding: 2rem 1rem; }
      .hero { padding: 3rem 0; }
      .hero__title { font-size: 2.25rem; }
      .hero__subtitle { font-size: 1rem; }
      .card-grid, .demo-grid { grid-template-columns: 1fr; }
      .badges { gap: 0.5rem; }
      .badge { font-size: 0.8rem; padding: 0.5rem 1rem; }
    }
  </style>
  {% seo %}
</head>
<body>
  <header class="site-header">
    <div class="site-header__inner">
      <a href="{{ '/' | relative_url }}" class="site-header__title">
        <span>{{ site.title }}</span>
      </a>
      <nav class="site-header__nav">
        <a href="{{ '/evidence/README.html' | relative_url }}">Evidence</a>
        <a href="{{ '/reports/junit/index.html' | relative_url }}">Reports</a>
        <a href="https://github.com/RNA4219/portfolio">GitHub</a>
      </nav>
    </div>
  </header>

  <main class="content">
    {{ content }}
  </main>

  <footer class="site-footer">
    <p>&copy; {{ site.time | date: '%Y' }} {{ site.title }}</p>
  </footer>
</body>
</html>
